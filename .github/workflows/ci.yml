name: CI

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop, main ]

jobs:
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: |
          **/node_modules
          ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-
    
    - name: Install dependencies
      run: |
        npm ci
        cd web/admin-spa && npm ci
    
    - name: Run ESLint (Backend)
      run: npm run lint
    
    - name: Run Prettier check (Backend)
      run: npm run format:check
    
    - name: Run ESLint (Frontend)
      run: cd web/admin-spa && npm run lint
    
    - name: Run Prettier check (Frontend)
      run: cd web/admin-spa && npm run format:check

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run tests
      run: npm test
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: backend-test-results
        path: |
          coverage/
          test-results.xml

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: cd web/admin-spa && npm ci
    
    - name: Run tests
      run: cd web/admin-spa && npm test
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: frontend-test-results
        path: web/admin-spa/coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        npm ci
        cd web/admin-spa && npm ci
    
    - name: Build frontend
      run: cd web/admin-spa && npm run build
    
    - name: Verify build output
      run: |
        ls -la web/admin-spa/dist/
        [ -f web/admin-spa/dist/index.html ] && echo "Frontend build successful"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    # 只在main分支上运行Docker构建
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      run: |
        docker build -t motel-api-service:ci-test .
    
    - name: Test Docker image
      run: |
        docker run --name ci-test -d -p 3000:3000 claude-relay-service:ci-test
        sleep 10
        docker ps | grep ci-test
        docker logs ci-test --tail=20
        docker stop ci-test
        docker rm ci-test